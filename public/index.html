<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ESP32 Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080810;
            --surface: #10101e;
            --surface2: #18182a;
            --border: rgba(120,100,255,0.13);
            --border2: rgba(120,100,255,0.28);
            --purple: #a78bfa;
            --purple-dim: #7c3aed;
            --aqua: #22d3ee;
            --aqua-dim: #0891b2;
            --white: #f0f0f8;
            --muted: #6b6b8a;
            --sun: #fbbf24;
            --moon: #818cf8;
            --font-mono: 'Space Mono', monospace;
            --font-body: 'DM Sans', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
            padding: 32px 20px 60px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(120,100,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(120,100,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrap { max-width: 620px; margin: 0 auto; position: relative; z-index: 1; }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .logo strong { color: var(--purple); font-weight: 700; }

        .header-right { display: flex; align-items: center; gap: 10px; }

        .esp-badge, .led-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 14px;
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--muted);
            transition: all 0.4s;
        }

        .esp-badge.on { border-color: var(--aqua); color: var(--aqua); }

        .badge-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #333;
            transition: all 0.4s;
        }

        .esp-badge.on .badge-dot {
            background: var(--aqua);
            box-shadow: 0 0 6px var(--aqua);
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        #led-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #1a1a2a;
            transition: all 0.3s;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px 24px;
            margin-bottom: 14px;
            transition: border-color 0.3s;
        }

        .card:hover { border-color: var(--border2); }

        .card-label {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .sensor-inner {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .sensor-icon {
            width: 64px; height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
            background: var(--surface2);
            transition: all 0.5s;
        }

        .sensor-icon.day { background: rgba(251,191,36,0.12); box-shadow: 0 0 24px rgba(251,191,36,0.15); }
        .sensor-icon.night { background: rgba(129,140,248,0.12); box-shadow: 0 0 24px rgba(129,140,248,0.15); }

        .sensor-info { flex: 1; }

        .sensor-val {
            font-family: var(--font-mono);
            font-size: 42px;
            font-weight: 700;
            line-height: 1;
            color: var(--aqua);
            transition: color 0.5s;
        }

        .sensor-val.day { color: var(--sun); }
        .sensor-val.night { color: var(--moon); }

        .sensor-desc {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }

        .sensor-bar-wrap {
            height: 4px;
            background: var(--surface2);
            border-radius: 2px;
            margin-bottom: 14px;
            overflow: hidden;
        }

        .sensor-bar {
            height: 100%;
            border-radius: 2px;
            background: var(--aqua);
            width: 0%;
            transition: width 0.4s, background 0.5s;
        }

        .sensor-bar.day { background: var(--sun); }
        .sensor-bar.night { background: var(--moon); }

        canvas { width: 100%; display: block; border-radius: 10px; }

        .voz-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .mic-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(124,58,237,0.1);
            border: 1px solid rgba(124,58,237,0.25);
            border-radius: 10px;
        }

        .mic-pulse {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--purple);
            animation: pulso 1s infinite;
        }

        @keyframes pulso { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

        .mic-label {
            font-size: 12px;
            font-family: var(--font-mono);
            color: var(--purple);
            letter-spacing: 1px;
        }

        button {
            width: 100%;
            padding: 11px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: var(--font-body);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface2);
            color: var(--white);
            letter-spacing: 0.5px;
        }

        button:hover { border-color: var(--border2); background: #1e1e32; }
        button:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--aqua);
            color: #080810;
            border-color: var(--aqua);
            font-weight: 500;
        }

        .btn-primary:hover { background: var(--aqua-dim); border-color: var(--aqua-dim); color: #fff; }

        .btn-purple {
            background: var(--purple-dim);
            color: #fff;
            border-color: var(--purple-dim);
            font-weight: 500;
            width: auto;
            padding: 11px 20px;
            flex-shrink: 0;
        }

        .btn-purple:hover { background: #6d28d9; border-color: #6d28d9; }

        .input-row { display: flex; gap: 10px; }

        input[type=text] {
            flex: 1;
            padding: 11px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--white);
            font-family: var(--font-mono);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type=text]:focus { border-color: var(--purple); }
        input[type=text]::placeholder { color: var(--muted); }

        .log-box {
            height: 160px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 11px;
            line-height: 1.8;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
        }

        .log-box::-webkit-scrollbar { width: 4px; }
        .log-box::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        .log-line { color: var(--muted); border-bottom: 1px solid var(--border); padding: 2px 0; }
        .log-line .ts { color: var(--purple); margin-right: 8px; }
        .log-line .voz-tag { color: var(--aqua); }
        .log-line .err-tag { color: #f87171; }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <div class="logo"><strong>ESP32</strong> // control panel</div>
        <div class="header-right">
            <div class="esp-badge" id="esp-badge">
                <div class="badge-dot"></div>
                <span id="esp-status">desconectado</span>
            </div>
            <div class="led-badge">
                <div id="led-dot"></div>
                <span id="led-label" style="font-family:var(--font-mono);font-size:11px;color:var(--muted);">led off</span>
            </div>
        </div>
    </header>

    <div class="card">
        <div class="card-label">sensor // fotoresistencia</div>
        <div class="sensor-inner">
            <div class="sensor-icon" id="sensor-icon">◐</div>
            <div class="sensor-info">
                <div class="sensor-val" id="sensor-val">---</div>
                <div class="sensor-desc" id="sensor-desc">esperando datos...</div>
            </div>
        </div>
        <div class="sensor-bar-wrap">
            <div class="sensor-bar" id="sensor-bar"></div>
        </div>
        <canvas id="grafica" height="80"></canvas>
    </div>

    <div class="card">
        <div class="card-label">reconocimiento // voz</div>
        <div class="mic-indicator" id="mic-indicator">
            <div class="mic-pulse"></div>
            <span class="mic-label">escuchando...</span>
        </div>
        <div class="voz-row">
            <button class="btn-primary" id="btn-voz" onclick="iniciarVoz()">▶ iniciar</button>
            <button onclick="detenerVoz()">■ detener</button>
        </div>
    </div>

    <div class="card">
        <div class="card-label">comando // texto</div>
        <div class="input-row">
            <input type="text" id="cmd-input" placeholder="ENCENDER / APAGAR" />
            <button class="btn-purple" onclick="enviarTexto()">enviar</button>
        </div>
    </div>

    <div class="card">
        <div class="card-label">log // servidor</div>
        <div class="log-box" id="log"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById('grafica');
const ctx = canvas.getContext('2d');
const MAX = 60;
const datos = [];

if (Notification.permission !== 'granted') Notification.requestPermission();

function notificar(t, b) {
    if (Notification.permission === 'granted') new Notification(t, { body: b });
}

function actualizarLed(encendido) {
    const dot = document.getElementById('led-dot');
    const label = document.getElementById('led-label');
    if (encendido) {
        dot.style.background = '#22d3ee';
        dot.style.boxShadow = '0 0 8px #22d3ee, 0 0 16px rgba(34,211,238,0.4)';
        label.textContent = 'led on';
        label.style.color = '#22d3ee';
    } else {
        dot.style.background = '#1a1a2a';
        dot.style.boxShadow = 'none';
        label.textContent = 'led off';
        label.style.color = 'var(--muted)';
    }
}

function actualizarSensor(val) {
    const n = Number(val);
    const pct = Math.round((n / 4095) * 100);
    const icon = document.getElementById('sensor-icon');
    const valEl = document.getElementById('sensor-val');
    const desc = document.getElementById('sensor-desc');
    const bar = document.getElementById('sensor-bar');

    bar.style.width = pct + '%';

    if (n > 2500) {
        icon.textContent = '☀';
        icon.className = 'sensor-icon day';
        valEl.className = 'sensor-val day';
        desc.textContent = 'luz alta · ' + pct + '% · adc ' + n;
        bar.className = 'sensor-bar day';
    } else if (n > 1000) {
        icon.textContent = '◑';
        icon.className = 'sensor-icon';
        valEl.className = 'sensor-val';
        desc.textContent = 'luz media · ' + pct + '% · adc ' + n;
        bar.className = 'sensor-bar';
    } else {
        icon.textContent = '☽';
        icon.className = 'sensor-icon night';
        valEl.className = 'sensor-val night';
        desc.textContent = 'poca luz · ' + pct + '% · adc ' + n;
        bar.className = 'sensor-bar night';
    }

    valEl.textContent = n;
}

function dibujarGrafica() {
    const W = canvas.offsetWidth || 560;
    const H = 80;
    canvas.width = W;
    canvas.height = H;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#10101e';
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(120,100,255,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
        const y = (H / 4) * i;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    if (datos.length < 2) return;

    const last = datos[datos.length - 1];
    const lineColor = last > 2500 ? '#fbbf24' : last > 1000 ? '#22d3ee' : '#818cf8';

    ctx.beginPath();
    datos.forEach((v, i) => {
        const x = (i / (MAX - 1)) * W;
        const y = H - (v / 4095) * H;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    ctx.fillStyle = lineColor + '22';
    ctx.fill();

    ctx.beginPath();
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 1.5;
    datos.forEach((v, i) => {
        const x = (i / (MAX - 1)) * W;
        const y = H - (v / 4095) * H;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    const lx = ((datos.length - 1) / (MAX - 1)) * W;
    const ly = H - (last / 4095) * H;
    ctx.beginPath();
    ctx.arc(lx, ly, 3, 0, Math.PI * 2);
    ctx.fillStyle = lineColor;
    ctx.fill();
}

socket.on('esp32_status', function(data) {
    const badge = document.getElementById('esp-badge');
    const status = document.getElementById('esp-status');
    badge.className = 'esp-badge' + (data.conectado ? ' on' : '');
    status.textContent = data.conectado ? 'conectado' : 'desconectado';
    notificar('ESP32', data.conectado ? 'conectado' : 'desconectado');
});

socket.on('voz_status', function(data) {
    const btn = document.getElementById('btn-voz');
    const ind = document.getElementById('mic-indicator');
    if (data.activa) {
        btn.textContent = '● escuchando';
        btn.style.background = '#7c3aed';
        btn.style.borderColor = '#7c3aed';
        btn.style.color = '#fff';
        ind.style.display = 'flex';
    } else {
        btn.textContent = '▶ iniciar';
        btn.style.background = 'var(--aqua)';
        btn.style.borderColor = 'var(--aqua)';
        btn.style.color = '#080810';
        ind.style.display = 'none';
    }
});

socket.on('sensor', function(data) {
    actualizarSensor(data);
    datos.push(Number(data));
    if (datos.length > MAX) datos.shift();
    dibujarGrafica();
});

socket.on('log', function(msg) {
    log(msg);
    const u = msg.toUpperCase();
    if (u.includes('ENCENDER') || u.includes('PRENDER')) actualizarLed(true);
    if (u.includes('APAGAR')) actualizarLed(false);
});

function log(msg) {
    const div = document.getElementById('log');
    const time = new Date().toLocaleTimeString();
    const tag = msg.startsWith('VOZ ERR') ? '<span class="err-tag">' + msg + '</span>'
               : msg.startsWith('VOZ') ? '<span class="voz-tag">' + msg + '</span>'
               : msg;
    div.innerHTML += '<div class="log-line"><span class="ts">' + time + '</span>' + tag + '</div>';
    div.scrollTop = div.scrollHeight;
}

function iniciarVoz() {
    fetch('/iniciar-voz').then(r => r.json()).then(d => log(d.msg));
}
function detenerVoz() {
    fetch('/detener-voz').then(r => r.json()).then(d => log(d.msg));
}
function enviarTexto() {
    const cmd = document.getElementById('cmd-input').value.trim();
    if (!cmd) return;
    fetch('/comando/' + encodeURIComponent(cmd)).then(r => r.json()).then(d => log(d.msg));
    document.getElementById('cmd-input').value = '';
}

document.getElementById('cmd-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') enviarTexto();
});

window.addEventListener('resize', dibujarGrafica);
</script>
</body>
</html>
